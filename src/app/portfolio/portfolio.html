<section class="portfolio">
  <h1 appTypography="heading-3">Portfolio</h1>

  <p class="portfolio__total">
    Total value: <strong>{{ totalValue() | currency: 'USD' }}</strong>
  </p>

  <table mat-table [dataSource]="rows()">

    <ng-container matColumnDef="asset">
      <th mat-header-cell *matHeaderCellDef>Asset</th>
      <td mat-cell *matCellDef="let row">{{ row.asset }}</td>
    </ng-container>

    <ng-container matColumnDef="available">
      <th mat-header-cell *matHeaderCellDef>Available</th>
      <td mat-cell *matCellDef="let row">{{ row.available | number: '1.0-8' }}</td>
    </ng-container>

    <ng-container matColumnDef="inOrder">
      <th mat-header-cell *matHeaderCellDef>In Order</th>
      <td mat-cell *matCellDef="let row">{{ row.inOrder | number: '1.0-8' }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price (USD)</th>
      <td mat-cell *matCellDef="let row">{{ row.price | currency: 'USD' }}</td>
    </ng-container>

    <ng-container matColumnDef="value">
      <th mat-header-cell *matHeaderCellDef>Value (USD)</th>
      <td mat-cell *matCellDef="let row">{{ row.value | currency: 'USD' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
