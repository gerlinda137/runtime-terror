<ng-container class="trending-market">

  <div class="trending-market__header">
    <app-typography variant="headingS" text="Trending Market" />
    <a href="#" class="trending-market__view-all">View more markets</a>
  </div>


  <table mat-table [dataSource]="tokens">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Token</th>
      <td mat-cell *matCellDef="let row" class="name-cell">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="symbol">
      <th mat-header-cell *matHeaderCellDef>Symbol</th>
      <td mat-cell *matCellDef="let row">{{ row.symbol | symbol }}</td>
    </ng-container>

    <ng-container matColumnDef="lastPrice">
      <th mat-header-cell *matHeaderCellDef>Last Price</th>
      <td mat-cell *matCellDef="let row">{{ row.lastPrice | currency:'USD' }}</td>
    </ng-container>

    <ng-container matColumnDef="change24hour">
      <th mat-header-cell *matHeaderCellDef>24H Change</th>
      <td mat-cell *matCellDef="let row">{{ row.change24hour }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</ng-container>
