
<div class="header-section">
  <div class="title-field">
    <!-- instead of Zarror - username -->
    <app-typography text="Welcome Zarror!" variant="headingL" class="main-title" />
    <app-typography
      text="Hope you are healthy and happy today..."
      variant="descriptionS"
      class="sub-title"
    />
  </div>
  <div class="utilities-field">
    <div class="search-bar">
      <input type="text" placeholder="Search..." />
      <img src="assets/icons/search_icon.svg" alt="Search Icon" />
    </div>

    <div class="user-actions">
      <div matBadge="1" matBadgeSize="small" class="demo-section">
        <img src="assets/icons/notif_icon.svg" alt="Notification icon" class="notif-icon" />
      </div>

      <div
        class="menu-trigger-wrapper"
        [matMenuTriggerFor]="userMenu"
        #menuTrigger="matMenuTrigger"
      >
        <div class="user-icon-area">
          <img
            [src]="isLogedin ? 'assets/icons/user.png' : 'assets/icons/default_user.svg'"
            alt="User Profile Picture"
            [class.def-user-icon]="!isLogedin"
          />
        </div>

        <span class="arrow" [class.rotated]="menuTrigger.menuOpen">
          <img src="assets/icons/arrow_down.svg" alt="Arrow Down" />
        </span>
      </div>

      <mat-menu #userMenu="matMenu" xPosition="before" class="custom-user-menu">
        @if (isLogedin) {
          <button mat-menu-item>
            <mat-icon>account_circle</mat-icon>
            <span>Profile</span>
          </button>
          <button mat-menu-item class="logout-btn">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        } @else {
          <button mat-menu-item>
            <mat-icon>login</mat-icon>
            <span>Log In</span>
          </button>
          <button mat-menu-item>
            <mat-icon>person_add</mat-icon>
            <span>Sign Up</span>
          </button>
        }
      </mat-menu>
    </div>
  </div>
</div>
