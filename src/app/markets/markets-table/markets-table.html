<table mat-table [dataSource]="rows()" matSort (matSortChange)="onSort($event)" class="markets-table">

    <!-- PAIR column: crypto icon + BASE/QUOTE -->
    <ng-container matColumnDef="pair">
        <th mat-header-cell *matHeaderCellDef>Pair</th>
        <td mat-cell *matCellDef="let row">
            <div class="pair-cell">
                <img [appCryptoIcon]="row.baseAsset.toLowerCase()" [alt]="row.baseAsset" width="24" height="24"
                    class="pair-cell__icon" />
                <span class="pair-cell__base">{{ row.baseAsset }}</span>
                <span class="pair-cell__quote">/{{ row.quoteAsset }}</span>
            </div>
        </td>
    </ng-container>

    <!-- PRICE column: sortable, flashes on WS update -->
    <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
        <td mat-cell *matCellDef="let row" [ngClass]="{ 'price-flash': flashingSymbols().has(row.symbol) }">
            {{ row.priceDisplay }}
        </td>
    </ng-container>

    <!-- 24H CHANGE column: sortable, green/red via ChangeColor directive -->
    <ng-container matColumnDef="change24h">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>24h Change</th>
        <td mat-cell *matCellDef="let row">
            <span [appChangeColor]="row.change24h">
                {{ row.change24h >= 0 ? '↑' : '↓' }} {{ row.change24h | changeHour }}
            </span>
        </td>
    </ng-container>

    <!-- 24H VOLUME column: sortable, formatted K/M/B -->
    <ng-container matColumnDef="volume24h">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>24h Volume</th>
        <td mat-cell *matCellDef="let row">{{ row.volume24h | formatVolume }}</td>
    </ng-container>

    <!-- FAVOURITE column: star icon button -->
    <ng-container matColumnDef="favourite">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="fav-cell">
            <button mat-icon-button (click)="onFavClick($event, row.symbol)"
                [attr.aria-label]="row.isFavourite ? 'Remove from watchlist' : 'Add to watchlist'">
                <mat-icon [class.fav-active]="row.isFavourite">
                    {{ row.isFavourite ? 'star' : 'star_border' }}
                </mat-icon>
            </button>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedCols; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedCols; trackBy: trackBySymbol" (click)="onRowClick(row.symbol)" class="clickable-row">
    </tr>

</table>

<!-- Empty state -->
@if (rows().length === 0) {
<div class="empty-state">
    <mat-icon>search_off</mat-icon>
    <span>No pairs found</span>
</div>
}
