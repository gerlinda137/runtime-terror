<div class="password-editor" appClickOutside (clickOutside)="cancel()">
  <div class="heading">
    <h4
      appTypography="large-text-regular">{{changePass}}</h4>
    <button mat-icon-button
      (click)="isEditMode() ? save() : startEdit()"
      [matTooltip]="isEditMode() ? savePass : editPass"
      matTooltipPosition="above">
      <mat-icon>{{isEditMode() ? 'check': 'edit'}}</mat-icon>
    </button>
  </div>
  @if(isEditMode()) {
  <fieldset
    class="password-fields"
    animate.enter="password-enter"
    animate.leave="password-leave">

    <div class="field">
      <label appTypography="small-text-semibold" for="old-password">
        {{currentPass}}
      </label>
      <input
        id="old-password"
        type="text"
        [formControl]="form.controls.oldPassword" />
    </div>

    <div class="field">
      <label appTypography="small-text-semibold" for="new-password">
        {{newPass}}
      </label>
      <input
        id="new-password"
        type="password"
        [formControl]="form.controls.newPassword" />
    </div>

    <button
      mat-raised-button
      color="primary"
      class="save-btn"
      (click)="save()">
      {{savePass}}
    </button>
  </fieldset>
  }
</div>
