<div class="password-editor" appClickOutside (clickOutside)="cancel()">
  <div class="heading">
    <h4
      appTypography="large-text-regular">{{changePass}}</h4>
    <button mat-icon-button
      (click)="isEditMode() ? save() : startEdit()"
      [matTooltip]="isEditMode() ? savePass:editPass"
      matTooltipPosition="above">
      <mat-icon>{{isEditMode() ? 'check': 'edit'}}</mat-icon>
    </button>
  </div>
</div>
