<div class="password-editor"
  appClickOutside (clickOutside)="cancel()">
  @let isEditMode = editing();

  <div class="heading">
    <h4
      appTypography="large-text-regular">Change Password</h4>

    <button mat-icon-button
      (click)="isEditMode ? save() : startEdit()"
      [matTooltip]="isEditMode ? 'Save Password' : 'Edit Password'"
      matTooltipPosition="above">
      <mat-icon>{{isEditMode ? 'check': 'edit'}}</mat-icon>
    </button>
  </div>
  @if(isEditMode) {
  <fieldset
    class="password-fields"
    animate.enter="password-enter"
    animate.leave="password-leave">

    <div class="field">
      <label appTypography="small-text-semibold" for="old-password">
        Current Password
      </label>
      <input
        id="old-password"
        type="text"
        [formControl]="form.controls.oldPassword" />
    </div>

    <div class="field">
      <label appTypography="small-text-semibold" for="new-password">
        New Password
      </label>
      <input
        id="new-password"
        type="password"
        [formControl]="form.controls.newPassword" />
    </div>

    <button
      mat-raised-button
      color="primary"
      class="save-btn"
      (click)="save()">
      Save Password
    </button>
  </fieldset>
  }
</div>
