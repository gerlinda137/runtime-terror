<div class="name-editor" appClickOutside (clickOutside)="cancel()">

  @if (!editing()) {
  <span appTypography="large-text-semibold">{{ name() }}</span>
  } @else {
  <input
    class="name-editor-input"
    [formControl]="control"
    (keydown.enter)="save()" />
  }

  <button mat-icon-button (click)="editing() ? save() : startEdit()">
    <mat-icon>{{editing() ? 'check': 'edit'}}</mat-icon>
  </button>
</div>
