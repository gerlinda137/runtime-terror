<div class="name-editor" appClickOutside (clickOutside)="cancel()">

  @if (!editing()) {
  <span
    appTypography="large-text-semibold"
    matTooltip="User name"
    matTooltipPosition="above"
    matTooltipClass="tooltip-left">{{ name() }}
  </span>
  } @else {
  <input
    class="name-editor-input"
    [formControl]="control"
    (keydown.enter)="save()" />
  }

  <button mat-icon-button
    (click)="editing() ? save() : startEdit()"
    [matTooltip]="editing() ? 'Save name':'Edit name'"
    matTooltipPosition="above">
    <mat-icon>{{editing() ? 'check': 'edit'}}</mat-icon>
  </button>
</div>
