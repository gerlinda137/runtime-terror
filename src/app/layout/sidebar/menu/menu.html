<div class="wrap">
  <mat-nav-list>

    @for (item of menu; track item.label) {

    @if (!item.children) {
    <a
      [routerLink]="item.link"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="item">
      <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
      <span
        appTypography="medium-text-semibold">
        {{ item.label}}
      </span>
    </a>
    }

    @if (item.children) {
    <div class="parent"
      tabindex="0"
      (click)="toggle(item.label)"
      (keydown.enter)="toggle(item.label)"
      (keydown.space)="toggle(item.label)">
      <mat-icon>{{ item.icon }}</mat-icon>
      <span
        routerLinkActive="active"
        appTypography="medium-text-semibold">
        {{item.label}}
      </span>
      <mat-icon class="arrow">
        {{ openedItem === item.label ? 'expand_less' : 'expand_more' }}
      </mat-icon>
    </div>

    <div class="children" [class.open]="openedItem === item.label">
      @for (child of item.children; track child.label) {
      <a
        [routerLink]="child.link"
        routerLinkActive="active"
        class="child">
        <span
          appTypography="medium-text-semibold">
          {{child.label}}
        </span>
      </a>
      }
    </div>
    }
    }

  </mat-nav-list>
</div>
